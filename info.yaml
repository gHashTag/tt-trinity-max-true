# Tiny Tapeout project information — TRI-1 MAX-TRUE FLAGSHIP
# https://tinytapeout.com/specs/info_yaml/
#
# L-DPC22-K S-13 DUAL-LIB ZONING HINT (feat/v15/k-dual-lib)
# Primary standard-cell library: sky130_fd_sc_hd
# Leakage-reduction target library: sky130_fd_sc_hdll
# Low-activity blocks targeted for hdll zoning:
#   lucas_rom* (POST chain x7), crc32_receipt, blake3_anchor, gf16_mul
# Expected static leakage saving: ~30% (5-10x lower per-cell leakage on hdll
# vs hd variant; mixed-mode zoning expected to reduce ~30% at block level).
# See docs/L-DPC22-K-DUAL-LIB.md for full specification.
# Reference: https://skywater-pdk.readthedocs.io/en/main/contents/libraries/foundry-provided.html
# G-13 gate: mixed hd+hdll closes timing if WNS>=0; rollback to pure hd if WNS<0.
# R-SI-1 verified: Lane K is config/docs only - zero changes to src/*.v
yaml_version: 6

project:
  title:        "TRI-1 Gamma — Trinity γ-surface 8×4 32-PE softmax mesh"
  author:       "Dmitrii Vasilev"
  discord:      "ghashtag"
  description:  >
    FLAGSHIP SKU of the TRI-1 Triad (Nano / Mid / MAX-TRUE), W15-TT-E
    submission (TTSKY26b). 32 honest GF16(2^4) ternary MAC cells
    arranged as 2 clusters × 4 banks × 4 tiles, each cluster being
    a trinity_quad_mesh (= 4× trinity_mesh_2x2). Packet routing:
    lane[3]=cluster, lane[2:1]=bank, dst[27:26]=tile.
    Carries the FULL Mid SUPER-CROWN module set + 6 PhD-anchored
    monitor singletons = 24 SUPER-CROWN modules total:
    phi_anchor_post, lucas_rom×7 (POST chain), vsa_matmul_8x8 / 16x16,
    bitnet_encoder, bpb_counter, blake3_anchor, multi_tile_receipt,
    crc32_receipt, alu9_decoder, ring27_memory, hwrng_lfsr,
    phi_pll_div, wb_status_reg, wishbone_full, trinity_master_fsm,
    trinity_mesh_2x2, gf16_dot4, plus 6 PhD-anchored monitors:
    cassini_post (L-S23, second φ²+φ⁻²=3 Qed proof),
    plrm_counter (L-S22, SCH-1 LCM(29,47)=1363 mutual exclusion),
    bpb_lower_bound_guard (L-S33, THM-25-3 bpb_non_negative Qed),
    nca_entropy_monitor (L-S24, INV-4 12 H ∈ [1.5,2.8] nats),
    strobe_seed_guard (L-S28, INV-2-ext seed mod F9=34 ∈ [8,11] forbidden),
    phi_distance_oracle (L-S32, phi_distance_nonneg, 360-entry Q1.15 LUT). On reset the chip drives the
    canonical dot4(1.0, 2.0, 3.0, 4.0) = 0x47C0 on {uio_out, uo_out}
    — byte-identical to Nano (tt-trinity-nano) and Mid
    (tt-trinity-gf16). That equality is the cross-die anchor of
    TG-TRIAD-X (PhD Theorem 36.1, docs/phd/chapters/flos_70.tex).
    R-SI-1: zero NEW `*` operators (legacy gf16_mul grandfathered per
    TRI_NET_SHUTTLE_TRIAD.md Rule 2 / tt-trinity-gf16#4).
    Anchor: phi^2 + phi^-2 = 3. DOI: 10.5281/zenodo.19227877.
    S-13 dual-lib: sky130_fd_sc_hd primary + sky130_fd_sc_hdll zoning
    intent for low-activity blocks (lucas_rom*, crc32_receipt,
    blake3_anchor, gf16_mul). Target: -30% static leakage.
    See docs/L-DPC22-K-DUAL-LIB.md. L-DPC22 Lane K feat/v15/k-dual-lib.
  language:     "Verilog"
  clock_hz:     50000000

  # FLAGSHIP footprint = 8×4 TT tiles = 32 TT tiles = 0.7047 mm² Sky130A.
  # Honestly 2× Mid (8×2 = 16 TT tiles) — no silicon shortcuts.
  # Largest allowed digital footprint per
  # https://github.com/TinyTapeout/tt-support-tools/blob/main/tech/sky130A/tile_sizes.yaml
  tiles:        "8x4"

  top_module:   "tt_um_trinity_max_true"

  source_files:
    - "tt_um_trinity_max_true.v"
    - "trinity_max_true_dual.v"
    - "trinity_quad_mesh.v"
    - "trinity_mesh_2x2.v"
    - "trinity_router_2x2.v"
    - "trinity_gf16_tile.v"
    - "trinity_master_fsm.v"
    - "gf16_mul.v"
    - "gf16_add.v"
    - "gf16_dot4.v"
    - "gf16_dot8.v"
    - "gf16_popcount.v"
    - "gf16_popcount16.v"
    - "phi_anchor_post.v"
    - "lucas_rom.v"
    - "vsa_matmul_8x8.v"
    - "vsa_matmul_16x16.v"
    - "bitnet_encoder.v"
    - "bpb_counter.v"
    - "blake3_anchor.v"
    - "multi_tile_receipt.v"
    - "crc32_receipt.v"
    - "alu9_decoder.v"
    - "ring27_memory.v"
    - "hwrng_lfsr.v"
    - "phi_pll_div.v"
    - "wb_status_reg.v"
    - "wishbone_full.v"
    - "trinity_friend_foe.v"
    - "cassini_post.v"
    - "plrm_counter.v"
    - "bpb_lower_bound_guard.v"
    - "nca_entropy_monitor.v"
    - "strobe_seed_guard.v"
    - "phi_distance_oracle.v"

pinout:
  ui[0]: "load_mode (0=canonical 0x47C0 default, 1=packet path + status_byte)"
  ui[1]: "lucas_idx[0]"
  ui[2]: "lucas_idx[1]"
  ui[3]: "lucas_idx[2]"
  ui[4]: "unused"
  ui[5]: "unused"
  ui[6]: "unused"
  ui[7]: "unused"
  uo[0]: "result[0] (canonical 0x47C0 default; mesh result_lo[0] after FSM)"
  uo[1]: "result[1]"
  uo[2]: "result[2]"
  uo[3]: "result[3]"
  uo[4]: "result[4]"
  uo[5]: "result[5]"
  uo[6]: "result[6]"
  uo[7]: "result[7]"
  uio[0]: "result[8] | status_byte[0] when load_mode && post_done"
  uio[1]: "result[9] | status_byte[1]"
  uio[2]: "result[10] | status_byte[2]"
  uio[3]: "result[11] | status_byte[3]"
  uio[4]: "result[12] | status_byte[4]"
  uio[5]: "result[13] | status_byte[5]"
  uio[6]: "result[14] | status_byte[6]"
  uio[7]: "result[15] | status_byte[7]"
