name: t27 Format Validation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  format-validation:
    name: Format Conformance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run format conformance (local specs)
        run: |
          if [ -d "conformance" ] && [ -f "tools/validate_formats.py" ]; then
            python3 tools/validate_formats.py conformance/FORMAT-SPEC-001.json
          else
            echo "No t27 conformance harness in this repo - skipping (validation lives in the meta t27 repo)"
          fi

      - name: Check GF invariants (specs/numeric)
        run: |
          if ls specs/numeric/gf*.t27 >/dev/null 2>&1; then
            echo "Found $(ls specs/numeric/gf*.t27 | wc -l) GF format specs"
          else
            echo "No GF format specs to validate"
          fi

  trinet-spec-gate:
    name: TRI-NET Spec Gate (claims coverage)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TRI-NET spec gate
        run: |
          if [ -x scripts/check_trinet_specs.sh ]; then
            bash scripts/check_trinet_specs.sh
          else
            echo "scripts/check_trinet_specs.sh missing or not executable" >&2
            exit 1
          fi

  trios-coq-validation:
    name: Coq Proofs Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inspect Coq proofs (non-fatal)
        run: |
          if [ -d trios-coq ]; then
            echo "=== IGLA Qed counts ==="
            for f in trios-coq/IGLA/*.v; do
              [ -f "$f" ] && echo "$(basename $f): $(grep -c 'Qed\.' $f || echo 0)"
            done
            echo "=== Physics Qed counts ==="
            for f in trios-coq/Physics/*.v; do
              [ -f "$f" ] && echo "$(basename $f): $(grep -c 'Qed\.' $f || echo 0)"
            done
          else
            echo "No trios-coq tree - skipping"
          fi

  rtl-synthesis:
    name: RTL Synthesis Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Yosys
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys

      - name: Check R-SI-1 compliance in rtl_gen (if present)
        run: |
          if [ -d rtl_gen ]; then
            echo "=== Checking for forbidden standalone star operators in rtl_gen ==="
            violation=0
            for f in $(find rtl_gen -name "*.v"); do
              stripped=$(sed 's://.*::; s:/\*[^*]*\*/::g' "$f")
              if echo "$stripped" | grep -E '[A-Za-z0-9_)\]][[:space:]]*\*[[:space:]]*[A-Za-z0-9_(]' | grep -v 'always[[:space:]]*@' >/dev/null; then
                echo "VIOLATION in $f"
                violation=1
              fi
            done
            if [ "$violation" = "0" ]; then echo "rtl_gen R-SI-1 compliant"; fi
          else
            echo "No rtl_gen directory - skipping"
          fi

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
